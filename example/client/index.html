<html>
    <head>
        <title>WhereverPassword</title>

        <link rel="stylesheet" href="styles.css" />
        
        <script src='jsaes.js'></script>
        <script src='user.js'></script>
        <script src='network.js'></script>
    </head>
    <body>

        <div class='container'>
        </div>

        <div class='notification-disconnected' style='visibility: hidden;'>
            <center>
                <div class='message'>
                    Server Disconnected
                </div>
            </center>
        </div>
        
        <div class='notification-connected' style='visibility: hidden;'>
            <center>
                <input id='pin' type='text' oninput='GUI.validatePIN()' />
            </center>
        </div>

        <div class='notification-details' onclick='GUI.hideDetails()' style='visibility: hidden;'>
            <div class='details'>
                <center>
                    <table>
                        <tr>
                            <td class='nametag'>Name:</td>
                            <td><b id='name'></b></td>
                        </tr>
                        <tr>
                            <td class='nametag'>Username:</td>
                            <td><b id='username'></b></td>
                        </tr>
                        <tr>
                            <td class='nametag'>Password:</td>
                            <td><b id='password'></b></td>
                        </tr>

                    </table>

                    <input style='display: none;' id='copyusername' value='' />
                    <input style='display: none;' id='copypassword' value='' />

                    <button onclick='copyToClipboard("copypassword");'>Copy password</button>
                    <button onclick='copyToClipboard("copyusername");'>Copy username</button>
                </center>
            </div>
        </div>

        <script src='main.js'></script>
    </body>
</html>
